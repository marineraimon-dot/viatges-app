<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Viatges Mariné Sánchez</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --teal:#0f6674; --teal-dark:#0b4b56; --sand:#f7f4ef; --card:#ffffff;
    --coral:#ff7a54; --text:#1c2b2e; --muted:#6b7a7d; --border:#e6e0d4;
    --green:#2e7d32; --green-bg:#e6f4e6; --red:#c62828; --red-bg:#fbe9e7; --muted-bg:#eef0ee;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--sand);color:var(--text);}
  #app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--sand);display:flex;flex-direction:column;}
  #topbar{position:sticky;top:0;z-index:20;background:var(--teal);color:#fff;padding:10px 14px 14px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
  .topbar-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
  #tripSelect{flex:1;padding:8px 10px;border-radius:8px;border:none;font-size:14px;background:rgba(255,255,255,.15);color:#fff;}
  #tripSelect option{color:#000;}
  .trip-name-input{width:100%;background:transparent;border:none;color:#fff;font-size:20px;font-weight:700;padding:2px 0;margin-bottom:6px;}
  .trip-name-input:focus{outline:1px solid rgba(255,255,255,.5);border-radius:4px;}
  .trip-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12.5px;color:rgba(255,255,255,.9);margin-bottom:6px;}
  .trip-meta-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
  .trip-meta-fields input, .trip-meta-fields select{width:100%;padding:6px 8px;border-radius:6px;border:none;font-size:12.5px;background:rgba(255,255,255,.15);color:#fff;}
  .trip-meta-fields input::placeholder{color:rgba(255,255,255,.7);}
  .avatars{display:flex;gap:4px;}
  .avatar{width:24px;height:24px;border-radius:50%;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
  #content{flex:1;padding:12px 12px 90px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  #tabbar-wrap{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:520px;z-index:20;}
  #tabbar{display:flex;overflow-x:auto;overflow-y:hidden;background:#fff;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0);
    -webkit-overflow-scrolling:touch;scroll-behavior:smooth;scroll-snap-type:x proximity;scrollbar-width:thin;
    touch-action:pan-x;overscroll-behavior-x:contain;transform:translateZ(0);will-change:scroll-position;}
  #tabbar::-webkit-scrollbar{height:4px;}
  #tabbar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .tabbar-fade{position:absolute;top:0;bottom:0;width:22px;pointer-events:none;z-index:1;}
  .tabbar-fade-left{left:0;background:linear-gradient(to right, rgba(255,255,255,.95), rgba(255,255,255,0));}
  .tabbar-fade-right{right:0;background:linear-gradient(to left, rgba(255,255,255,.95), rgba(255,255,255,0));}
  .tabbtn{flex:1 0 auto;scroll-snap-align:center;min-width:66px;background:none;border:none;padding:8px 10px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;color:var(--muted);cursor:pointer;touch-action:pan-x;}
  .tabbtn span{font-size:18px;}
  .tabbtn.active{color:var(--teal);font-weight:700;}
  .tab-toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .pills{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{border:1px solid var(--teal);background:#fff;color:var(--teal);border-radius:999px;padding:6px 12px;font-size:12.5px;cursor:pointer;white-space:nowrap;}
  .pill.active{background:var(--teal);color:#fff;}
  .card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .card h3{margin:0 0 8px;font-size:14.5px;color:var(--teal-dark);}
  label{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin:8px 0 3px;}
  input, select, textarea{width:100%;padding:8px 9px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;font-family:inherit;background:#fff;color:var(--text);}
  textarea{min-height:52px;resize:vertical;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 10px;}
  .row-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .row-head select{flex:0 0 auto;width:auto;}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .badge-green{background:var(--green-bg);color:var(--green);}
  .badge-red{background:var(--red-bg);color:var(--red);}
  .badge-muted{background:var(--muted-bg);color:var(--muted);}
  .badge-confirmat{background:var(--green-bg);color:var(--green);}
  .badge-planificacio{background:#fff3e0;color:#e65100;}
  .badge-passat{background:var(--muted-bg);color:var(--muted);}
  .icon-btn{margin-left:auto;background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer;padding:4px;}
  .icon-btn.danger{color:var(--red);}
  .btn{background:var(--coral);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;}
  .btn-secondary{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;}
  .btn-secondary.small{padding:5px 10px;font-size:11.5px;}
  .btn-secondary.danger{background:var(--red);}
  .btn-link{display:inline-block;margin-top:6px;color:var(--teal);font-size:12.5px;font-weight:700;text-decoration:none;}
  .link-btn{background:none;border:none;color:var(--teal);font-size:12px;text-decoration:underline;cursor:pointer;padding:0;margin-bottom:8px;}
  .day-card-head{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
  .day-num{font-weight:700;color:var(--teal-dark);font-size:13.5px;}
  .day-date{color:var(--muted);font-size:12px;}
  .attachments{margin-top:10px;}
  .attachments-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
  .chip{display:inline-flex;align-items:center;gap:4px;background:var(--muted-bg);border-radius:999px;padding:3px 4px 3px 10px;font-size:11.5px;}
  .chip button{background:none;border:none;cursor:pointer;font-size:11.5px;padding:2px;color:var(--text);}
  .chip-x{color:var(--red)!important;font-weight:700;}
  .sep{border:none;border-top:1px dashed var(--border);margin:12px 0;}
  .table-wrap{overflow-x:auto;}
  table.budget-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.budget-table th, table.budget-table td{padding:6px 5px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle;}
  table.budget-table input{padding:4px 5px;font-size:12px;}
  table.budget-table tfoot td{font-size:13px;padding-top:8px;}
  .empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:13.5px;}
  .muted{color:var(--muted);font-size:12px;}
  .small-note{font-size:11.5px;margin:-4px 0 10px;}
  .doc-row, .cal-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .doc-actions{display:flex;gap:6px;}
  .variants-manager .variant-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .variants-manager .variant-row input[type=text], .variants-manager .variant-row input:not([type]){width:auto;flex:1;}
  .rest-row{padding:6px 0;border-bottom:1px solid var(--border);}
  .rest-row:last-child{border-bottom:none;}
  .traveler-card label{margin-top:6px;}
  .lodging-row{padding:6px 0;}
  .split-among{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 8px;}
  .split-checks{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px;}
  .split-check{display:flex;align-items:center;gap:4px;font-size:12.5px;font-weight:400;color:var(--text);margin:0;}
  .split-check input{width:auto;}
  .balance-pos{color:var(--green);font-weight:700;}
  .balance-neg{color:var(--red);font-weight:700;}
  .settle-row{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .settle-row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div id="app">
  <header id="topbar"></header>
  <main id="content"></main>
  <div id="tabbar-wrap">
    <nav id="tabbar"></nav>
    <div class="tabbar-fade tabbar-fade-left" id="tabbarFadeLeft" style="display:none;"></div>
    <div class="tabbar-fade tabbar-fade-right" id="tabbarFadeRight" style="display:none;"></div>
  </div>
</div>

<script src="data-seed.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ════════════════════════════════════════════════════
//  CONFIG & STATE
// ════════════════════════════════════════════════════
const DB_NAME = 'viatges_app_v1';
const DB_VERSION = 1;
let db;

// Tot es guarda només en aquest dispositiu (IndexedDB del navegador).
// Res es puja ni es comparteix enlloc — funciona com una agenda/guia
// de viatge purament local.
const state = {
  trips: [],
  travelers: [],
  currentTripId: null,
  currentVariantId: null,
  tab: 'itinerari',
  budgetScenario: 'confort',
  leafletMap: null,
  pendingAttach: null,
};

const TABS = [
  { id: 'itinerari',    label: 'Itinerari',   icon: '🗺️' },
  { id: 'transport',    label: 'Vols',        icon: '✈️' },
  { id: 'allotjament',  label: 'Hotels',      icon: '🏨' },
  { id: 'pressupost',   label: 'Pressupost',  icon: '💰' },
  { id: 'despeses',     label: 'Despeses',    icon: '⚖️' },
  { id: 'mapa',         label: 'Mapa',        icon: '📍' },
  { id: 'calendari',    label: 'Calendari',   icon: '📅' },
  { id: 'gastronomia',  label: 'Gastro',      icon: '🍜' },
  { id: 'viatgers',     label: 'Viatgers',    icon: '👪' },
  { id: 'documents',    label: 'Docs',        icon: '📎' },
];

// ════════════════════════════════════════════════════
//  INDEXEDDB
// ════════════════════════════════════════════════════
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('trips')) d.createObjectStore('trips', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('travelers')) d.createObjectStore('travelers', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('attachments')) d.createObjectStore('attachments', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}
function idbGetAll(store) {
  return new Promise((resolve, reject) => {
    const req = db.transaction(store, 'readonly').objectStore(store).getAll();
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}
function idbGet(store, key) {
  return new Promise((resolve, reject) => {
    const req = db.transaction(store, 'readonly').objectStore(store).get(key);
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}
function idbPut(store, value) {
  return new Promise((resolve, reject) => {
    const req = db.transaction(store, 'readwrite').objectStore(store).put(value);
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}
function idbAdd(store, value) {
  return new Promise((resolve, reject) => {
    const req = db.transaction(store, 'readwrite').objectStore(store).add(value);
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}
function idbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const req = db.transaction(store, 'readwrite').objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = (e) => reject(e.target.error);
  });
}

async function saveTrip(trip) {
  await idbPut('trips', trip);
  const idx = state.trips.findIndex((t) => t.id === trip.id);
  if (idx >= 0) state.trips[idx] = trip; else state.trips.push(trip);
}

// ════════════════════════════════════════════════════
//  BOOT — tot ve i es guarda només a IndexedDB d'aquest dispositiu.
// ════════════════════════════════════════════════════
async function boot() {
  db = await openDB();
  let trips = await idbGetAll('trips');
  let travelers = await idbGetAll('travelers');

  // Primer cop absolut en aquest dispositiu: sembra amb les dades de fàbrica.
  if (trips.length === 0) {
    for (const t of (window.SEED_TRAVELERS || [])) await idbPut('travelers', t);
    for (const trip of (window.SEED_TRIPS || [])) await idbPut('trips', trip);
    trips = await idbGetAll('trips');
    travelers = await idbGetAll('travelers');
  }

  state.trips = trips;
  state.travelers = travelers;
  const defaultTrip = trips.find((t) => t.isDefault) || trips[0];
  if (defaultTrip) {
    state.currentTripId = defaultTrip.id;
    state.currentVariantId = defaultVariantFor(defaultTrip);
  }
  renderAll();
}

function getCurrentTrip() { return state.trips.find((t) => t.id === state.currentTripId); }
function defaultVariantFor(trip) {
  if (!trip || !trip.variants || !trip.variants.length) return null;
  const rec = trip.variants.find((v) => v.recommended);
  return rec ? rec.id : trip.variants[0].id;
}
function getNestedArray(trip, path) { return path.split('.').reduce((o, k) => o[k], trip); }
function setNested(obj, path, value) {
  const parts = path.split('.');
  let o = obj;
  for (let i = 0; i < parts.length - 1; i++) o = o[parts[i]];
  o[parts[parts.length - 1]] = value;
}

// ════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════
const $ = (sel) => document.querySelector(sel);
function escapeHtml(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function attr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function emptyState(msg) { return `<div class="empty-state">${escapeHtml(msg)}</div>`; }
function formatEUR(n) {
  if (n === null || n === undefined || n === '') return '—';
  const num = Number(n);
  if (Number.isNaN(num)) return '—';
  return num.toLocaleString('ca-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
}
function formatDateHuman(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('ca-ES', { weekday: 'short', day: 'numeric', month: 'short' });
}
function statusLabel(s) { return { confirmat: 'Confirmat', planificacio: 'Planificació', passat: 'Passat' }[s] || s; }
function lodgingStatusLabel(s) { return { reservat: 'Reservat', opcio: 'Opció', 'cancel·lat': 'Cancel·lat' }[s] || s; }
function legTypeLabel(t) {
  return { flight_intl: '✈ Vol internacional', flight_domestic: '✈ Vol intern', ferry: '⛴ Ferri', van: '🚐 Trasllat', car_rental: '🚗 Cotxe de lloguer', parking: '🅿️ Pàrquing', other: 'Transport' }[t] || 'Transport';
}
function gmapsLink(query, lat, lng) {
  if (lat !== null && lat !== undefined && lat !== '' && lng !== null && lng !== undefined && lng !== '') {
    return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lat + ',' + lng)}`;
  }
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query || '')}`;
}
function findDayWaypoint(trip, day, variantId) {
  const candidates = (trip.mapWaypoints || []).filter((w) => w.day === day && (!w.variantId || w.variantId === variantId));
  if (!candidates.length) return null;
  return candidates.find((w) => w.category === 'Base') || candidates[0];
}
function coerceValue(fieldPath, raw) {
  const numericFields = /price|valuesByScenario|nights|^day$|order|^lat$|^lng$/i;
  if (numericFields.test(fieldPath)) {
    if (raw === '') return null;
    const n = Number(raw);
    return Number.isNaN(n) ? raw : n;
  }
  return raw;
}
function updateField(arrPath, idx, fieldPath, rawValue) {
  const trip = getCurrentTrip();
  const arr = getNestedArray(trip, arrPath);
  const item = arr[idx];
  if (!item) return trip;
  setNested(item, fieldPath, coerceValue(fieldPath, rawValue));
  saveTrip(trip);
  return trip;
}

// ════════════════════════════════════════════════════
//  NEW ROW FACTORY
// ════════════════════════════════════════════════════
function newRowFor(arrName, trip) {
  const vId = (trip.variants && trip.variants.length > 1) ? state.currentVariantId : null;
  switch (arrName) {
    case 'itinerary': {
      const maxDay = trip.itinerary.reduce((m, d) => Math.max(m, d.day || 0), 0);
      return { day: maxDay + 1, date: '', variantId: vId, location: '', transit: '', activity: '', lodging: '', whereToEat: '', tips: '' };
    }
    case 'transportLegs':
      return { id: 'leg-' + uid(), type: 'other', variantId: vId, code: '', route: '', dateDep: '', timeDep: '', dateArr: '', timeArr: '', provider: '', pricePerPerson: null, priceTotal: null, status: 'opcio', bookingRef: '', bookingLink: '', notes: '', attachments: [] };
    case 'lodging':
      return { id: 'lg-' + uid(), destination: '', variantId: vId, category: 'confort', name: '', pricePerNight: null, nights: null, checkIn: '', checkOut: '', roomConfig: '', status: 'opcio', bookingLink: '', cancellationPolicy: '', notes: '', attachments: [] };
    case 'budget.categories':
      return { name: '', valuesByScenario: Object.fromEntries(trip.budget.scenarios.map((s) => [s.id, 0])), notes: '' };
    case 'activities':
      return { location: '', variantId: vId, name: '', description: '', price: null };
    case 'restaurants':
      return { location: '', variantId: vId, name: '', specialty: '', dish: '' };
    case 'mapWaypoints':
      return { name: '', lat: 0, lng: 0, variantId: vId, day: 1, order: trip.mapWaypoints.length + 1, category: 'Excursio', description: '' };
    case 'variants':
      return { id: 'v-' + uid(), label: 'Nova variant', recommended: false };
    case 'expenses':
      return { id: 'exp-' + uid(), date: '', description: '', amount: null, paidBy: (trip.travelerIds || [])[0] || null, splitAmong: [...(trip.travelerIds || [])], category: '', notes: '' };
    default:
      return {};
  }
}
function newBlankTrip() {
  const id = 'trip-' + uid();
  const coreIds = state.travelers.filter((t) => t.isCoreFamily).map((t) => t.id);
  return {
    id, name: 'Nou viatge', destination: '', status: 'planificacio', isDefault: false,
    dateStart: '', dateEnd: '', currency: 'EUR', notes: '',
    travelerIds: coreIds,
    familyGroups: [{ id: 'f1', label: 'Família', travelerIds: coreIds, roomConfig: '' }],
    variants: [{ id: 'principal', label: 'Ruta principal', recommended: true }],
    itinerary: [], transportLegs: [], lodging: [], lodgingOptions: [], activities: [], restaurants: [],
    budget: { scenarios: [{ id: 'economic', label: 'Econòmic' }, { id: 'confort', label: 'Confort' }, { id: 'premium', label: 'Premium' }], categories: [], imprevistosPct: 0.10, familyTotals: [] },
    expenses: [],
    mapWaypoints: [], myMapsUrl: null,
  };
}

// ════════════════════════════════════════════════════
//  RENDER: SHELL
// ════════════════════════════════════════════════════
function renderAll() {
  renderTopbar();
  renderTabbar();
  const trip = getCurrentTrip();
  if (!trip) { $('#content').innerHTML = emptyState('Cap viatge. Crea’n un de nou amb el botó de dalt.'); return; }
  switch (state.tab) {
    case 'itinerari': renderItinerariTab(trip); break;
    case 'transport': renderTransportTab(trip); break;
    case 'allotjament': renderAllotjamentTab(trip); break;
    case 'pressupost': renderPressupostTab(trip); break;
    case 'despeses': renderDespesesTab(trip); break;
    case 'mapa': renderMapaTab(trip); break;
    case 'calendari': renderCalendariTab(trip); break;
    case 'gastronomia': renderGastronomiaTab(trip); break;
    case 'viatgers': renderViatgersTab(trip); break;
    case 'documents': renderDocumentsTab(trip); break;
  }
}

function renderTopbar() {
  const trip = getCurrentTrip();
  if (!trip) {
    $('#topbar').innerHTML = `<div class="topbar-row"><strong>Viatges Mariné Sánchez</strong>
      <button class="btn-secondary small" data-action="create-trip">+ Nou viatge</button></div>`;
    return;
  }
  $('#topbar').innerHTML = `
    <div class="topbar-row">
      <select id="tripSelect">${state.trips.map((t) => `<option value="${t.id}" ${t.id === trip.id ? 'selected' : ''}>${escapeHtml(t.name)}</option>`).join('')}</select>
      <button class="btn-secondary small" data-action="create-trip">+ Nou viatge</button>
      ${state.trips.length > 1 ? `<button class="btn-secondary small danger" data-action="delete-trip" data-id="${trip.id}">🗑</button>` : ''}
    </div>
    <input class="trip-name-input" data-trip-field="name" value="${attr(trip.name)}">
    <div class="trip-meta-fields">
      <input data-trip-field="destination" value="${attr(trip.destination)}" placeholder="Destinació">
      <select data-trip-field="status">
        <option value="planificacio" ${trip.status === 'planificacio' ? 'selected' : ''}>Planificació</option>
        <option value="confirmat" ${trip.status === 'confirmat' ? 'selected' : ''}>Confirmat</option>
        <option value="passat" ${trip.status === 'passat' ? 'selected' : ''}>Passat</option>

function renderTabbar() {
  const tabbar = $('#tabbar');

  updateTabbarFades();
  if (!tabbar.dataset.scrollBound) {
    tabbar.addEventListener('scroll', updateTabbarFades, { passive: true });
    tabbar.dataset.scrollBound = '1';
  }
  const activeBtn = tabbar.querySelector('.tabbtn.active');
  if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', inline: 'center' });
}
function updateTabbarFades() {
  const tabbar = $('#tabbar');
  if (!tabbar) return;
  const leftFade = $('#tabbarFadeLeft');
  const rightFade = $('#tabbarFadeRight');
  if (!leftFade || !rightFade) return;
  const maxScroll = tabbar.scrollWidth - tabbar.clientWidth;
  leftFade.style.display = tabbar.scrollLeft > 4 ? 'block' : 'none';
  rightFade.style.display = tabbar.scrollLeft < maxScroll - 4 ? 'block' : 'none';
}

function travelerName(id) {
  const t = state.travelers.find((x) => x.id === id);
  return t ? `${t.firstName} ${t.lastName}`.trim() : '(desconegut)';
}
function computeBalances(trip) {
  const balances = {};
  (trip.travelerIds || []).forEach((id) => { balances[id] = 0; });
  (trip.expenses || []).forEach((exp) => {
    const amount = Number(exp.amount) || 0;
    const among = (exp.splitAmong && exp.splitAmong.length) ? exp.splitAmong.filter((id) => balances[id] !== undefined) : Object.keys(balances);
    const share = among.length ? amount / among.length : 0;
    if (exp.paidBy != null && balances[exp.paidBy] !== undefined) balances[exp.paidBy] += amount;
    among.forEach((id) => { balances[id] -= share; });
  });
  return balances;
}
function simplifyDebts(balances) {
  const creditors = [];
  const debtors = [];
  Object.entries(balances).forEach(([id, bal]) => {
    const r = Math.round(bal * 100) / 100;
    if (r > 0.01) creditors.push({ id, amount: r });
    else if (r < -0.01) debtors.push({ id, amount: -r });
  });
  creditors.sort((a, b) => b.amount - a.amount);
  debtors.sort((a, b) => b.amount - a.amount);
  const transactions = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const d = debtors[i], c = creditors[j];
    const amt = Math.round(Math.min(d.amount, c.amount) * 100) / 100;
    if (amt > 0.01) transactions.push({ from: d.id, to: c.id, amount: amt });
    d.amount -= amt; c.amount -= amt;
    if (d.amount <= 0.01) i++;
    if (c.amount <= 0.01) j++;
  }
  return transactions;
}

      </div>

      </div>
      <label>Notes<input data-arr="expenses" data-idx="${i}" data-field="notes" value="${attr(exp.notes)}"></label>

  const totalSpent = expenses.reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const personRows = travelers.map((t) => {
    const paid = expenses.filter((e) => e.paidBy === t.id).reduce((s, e) => s + (Number(e.amount) || 0), 0);
    const bal = balances[t.id] || 0;
    const owed = paid - bal;
    return `<tr><td>${escapeHtml(t.firstName + ' ' + t.lastName)}</td><td>${formatEUR(paid)}</td><td>${formatEUR(owed)}</td>
      <td class="${bal > 0.01 ? 'balance-pos' : (bal < -0.01 ? 'balance-neg' : '')}">${bal > 0.01 ? '+' : ''}${formatEUR(bal)}</td></tr>`;
  }).join('');
  const familyRows = (trip.familyGroups || []).map((g) => {
    const memberIds = g.travelerIds || [];
    const bal = memberIds.reduce((s, id) => s + (balances[id] || 0), 0);
    const paid = expenses.filter((e) => memberIds.includes(e.paidBy)).reduce((s, e) => s + (Number(e.amount) || 0), 0);
    return `<tr><td>${escapeHtml(g.label)}</td><td>${formatEUR(paid)}</td>
      <td class="${bal > 0.01 ? 'balance-pos' : (bal < -0.01 ? 'balance-neg' : '')}">${bal > 0.01 ? '+' : ''}${formatEUR(bal)}</td></tr>`;
  }).join('');
  const settlement = simplifyDebts(balances);
  const settlementRows = settlement.map((t) => `<div class="settle-row">💸 <strong>${escapeHtml(travelerName(t.from))}</strong> ha de pagar <strong>${formatEUR(t.amount)}</strong> a <strong>${escapeHtml(travelerName(t.to))}</strong></div>`).join('')
    || `<div class="muted">Tothom està en pau — cap transferència pendent.</div>`;

  $('#content').innerHTML = `
    <datalist id="expenseCategories">
      <option value="Allotjament"></option><option value="Vols i transport"></option><option value="Menjar"></option><option value="Activitats"></option><option value="Altres"></option>
    </datalist>
    <div class="tab-toolbar"><button class="btn" data-action="add-row" data-arr="expenses">+ Afegir despesa</button><span class="muted">Total gastat: <strong>${formatEUR(totalSpent)}</strong></span></div>
    ${cards}
    <div class="card table-wrap">
      <h3>Balanç per persona</h3>
      <table class="budget-table"><thead><tr><th>Viatger</th><th>Ha pagat</th><th>Li corresponia</th><th>Balanç</th></tr></thead><tbody>${personRows}</tbody></table>
    </div>
    ${familyRows ? `<div class="card table-wrap"><h3>Balanç per família</h3><table class="budget-table"><thead><tr><th>Família</th><th>Ha pagat</th><th>Balanç</th></tr></thead><tbody>${familyRows}</tbody></table></div>` : ''}
    <div class="card">
      <h3>Liquidació final</h3>
      ${settlementRows}
    </div>
  `;
}

const CATEGORY_COLORS = { Aeroport: '#0f6674', Base: '#ff7a54', Excursio: '#2e7d32', Estrella: '#c62828', Platja: '#0288d1', Connexio: '#6b7a7d', Opcional: '#9e9e9e', Ciutat: '#6a3d9a' };
const CATEGORY_COLORS_FALLBACK = '#333333';

function initMap(trip) {
  const mapEl = document.getElementById('leafletMap');
  if (!mapEl || typeof L === 'undefined') return;
  if (state.leafletMap) { state.leafletMap.remove(); state.leafletMap = null; }
  const map = L.map('leafletMap');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 18 }).addTo(map);
  const points = (trip.mapWaypoints || []).filter((w) => !w.variantId || w.variantId === state.currentVariantId).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
  if (points.length) {
    points.forEach((w) => {
      const color = CATEGORY_COLORS[w.category] || CATEGORY_COLORS_FALLBACK;
      const marker = L.circleMarker([w.lat, w.lng], { radius: 7, color, fillColor: color, fillOpacity: 0.85, weight: 2 }).addTo(map);
      marker.bindPopup(`<strong>${escapeHtml(w.name)}</strong><br>${escapeHtml(w.description || '')}<br><small>Dia ${w.day ?? '—'} · ${escapeHtml(w.category || '')}</small>`);
    });
    L.polyline(points.map((p) => [p.lat, p.lng]), { color: '#0f6674', weight: 2, dashArray: '5,6', opacity: 0.6 }).addTo(map);
    map.fitBounds(L.latLngBounds(points.map((p) => [p.lat, p.lng])), { padding: [24, 24] });
  } else {
    map.setView([20, 0], 2);
  }
  state.leafletMap = map;
}

function csvEscape(v) {
  const s = String(v ?? '');
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}
function exportMyMapsCSV(trip) {
  const variantLabel = (id) => { if (!id) return 'Comú'; const v = (trip.variants || []).find((x) => x.id === id); return v ? v.label : id; };
  const rows = [['Nom', 'Latitud', 'Longitud', 'Variant', 'Dia', 'Ordre', 'Categoria', 'Descripcio']];
  (trip.mapWaypoints || []).forEach((w) => rows.push([w.name, w.lat, w.lng, variantLabel(w.variantId), w.day, w.order, w.category, w.description]));
  const csv = rows.map((r) => r.map(csvEscape).join(',')).join('\r\n');
  downloadFile(`${trip.id}-mymaps.csv`, csv, 'text/csv');
}

//  RENDER: CALENDARI

function pad(n) { return String(n).padStart(2, '0'); }
function parseTimeLoose(t) {
  if (!t) return null;
  const m = String(t).replace('~', '').match(/(\d{1,2}):(\d{2})/);
  if (!m) return null;
  return { h: +m[1], m: +m[2] };
}
function addDaysISO(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function icsDateAllDay(dateStr) { return dateStr.replace(/-/g, ''); }
function icsDateTimeLocal(dateStr, timeObj) { return dateStr.replace(/-/g, '') + 'T' + pad(timeObj.h) + pad(timeObj.m) + '00'; }
function icsEscape(s) { return String(s ?? '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n'); }

function statusBadgeFor(status) {
  if (status === 'reservat') return { text: 'Reservat', cls: 'badge-green' };
  if (status === 'cancel·lat') return { text: 'Cancel·lat', cls: 'badge-red' };
  return { text: 'Opció', cls: 'badge-muted' };
}
function buildTripEvents(trip, variantId) {
  const events = [];
  (trip.itinerary || []).filter((d) => (!d.variantId || d.variantId === variantId) && d.date).forEach((d) => {
    events.push({ kind: 'day', title: `Dia ${d.day} · ${d.location || ''}`.trim(), location: d.location, details: [d.activity, d.transit, d.lodging, d.whereToEat, d.tips].filter(Boolean).join('\n'), allDay: true, dateStart: d.date, dateEnd: addDaysISO(d.date, 1), statusBadge: null });
  });
  (trip.transportLegs || []).filter((l) => (!l.variantId || l.variantId === variantId) && l.dateDep).forEach((l) => {
    const tDep = parseTimeLoose(l.timeDep);
    const tArr = parseTimeLoose(l.timeArr);
    const details = [l.provider, l.notes, l.bookingRef ? `Ref: ${l.bookingRef}` : ''].filter(Boolean).join('\n');
    const title = `${legTypeLabel(l.type)} ${l.code || ''} · ${l.route || ''}`.replace(/\s+/g, ' ').trim();
    const base = { kind: 'transport', title, location: l.route, details, statusBadge: statusBadgeFor(l.status) };
    if (tDep) {
      events.push({ ...base, allDay: false, dateStart: l.dateDep, timeStart: tDep, dateEnd: (l.dateArr && tArr) ? l.dateArr : l.dateDep, timeEnd: tArr || { h: (tDep.h + 2) % 24, m: tDep.m } });
    } else {
      events.push({ ...base, allDay: true, dateStart: l.dateDep, dateEnd: addDaysISO(l.dateDep, 1) });
    }
  });
  (trip.lodging || []).filter((lg) => (!lg.variantId || lg.variantId === variantId) && lg.checkIn && lg.checkOut).forEach((lg) => {
    events.push({ kind: 'lodging', title: `Allotjament: ${lg.name || lg.destination}`, location: lg.destination, mapsQuery: `${lg.name || ''} ${lg.destination || ''}`.trim(), details: [lg.roomConfig, lg.notes].filter(Boolean).join('\n'), allDay: true, dateStart: lg.checkIn, dateEnd: lg.checkOut, statusBadge: statusBadgeFor(lg.status) });
  });
  events.sort((a, b) => (a.dateStart || '').localeCompare(b.dateStart || ''));
  return events;
}
function toIcsDates(ev) {
  if (ev.allDay) return { start: icsDateAllDay(ev.dateStart), end: icsDateAllDay(ev.dateEnd), allDay: true };
  return { start: icsDateTimeLocal(ev.dateStart, ev.timeStart), end: icsDateTimeLocal(ev.dateEnd, ev.timeEnd), allDay: false };
}
function toGCalDates(ev) {
  if (ev.allDay) return `${icsDateAllDay(ev.dateStart)}/${icsDateAllDay(ev.dateEnd)}`;
  return `${icsDateTimeLocal(ev.dateStart, ev.timeStart)}/${icsDateTimeLocal(ev.dateEnd, ev.timeEnd)}`;
}
function googleCalLink(ev) {
  const params = new URLSearchParams({ action: 'TEMPLATE', text: ev.title, dates: toGCalDates(ev), details: ev.details || '', location: ev.location || '' });
  return 'https://calendar.google.com/calendar/render?' + params.toString();
}
function buildICS(trip, variantId) {
  const events = buildTripEvents(trip, variantId);
  const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Viatges Marine Sanchez//CA', 'CALSCALE:GREGORIAN'];
  events.forEach((ev, i) => {
    const d = toIcsDates(ev);
    lines.push('BEGIN:VEVENT');
    lines.push('UID:' + trip.id + '-' + i + '-' + Date.now() + '@viatges-marine-sanchez');
    lines.push('SUMMARY:' + icsEscape(ev.title));
    if (ev.location) lines.push('LOCATION:' + icsEscape(ev.location));
    if (ev.details) lines.push('DESCRIPTION:' + icsEscape(ev.details));
    if (d.allDay) { lines.push('DTSTART;VALUE=DATE:' + d.start); lines.push('DTEND;VALUE=DATE:' + d.end); }
    else { lines.push('DTSTART:' + d.start); lines.push('DTEND:' + d.end); }
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}
function exportICS(trip) { downloadFile(`${trip.id}.ics`, buildICS(trip, state.currentVariantId), 'text/calendar'); }
function formatEventWhen(ev) {
  if (ev.allDay) return formatDateHuman(ev.dateStart);
  return `${formatDateHuman(ev.dateStart)} · ${pad(ev.timeStart.h)}:${pad(ev.timeStart.m)}`;
}
function renderCalendariTab(trip) {
  const events = buildTripEvents(trip, state.currentVariantId);
  const groups = {};
  events.forEach((ev) => { (groups[ev.dateStart] = groups[ev.dateStart] || []).push(ev); });

            <div class="muted">${formatEventWhen(ev)}${ev.location ? ' · ' + escapeHtml(ev.location) : ''}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            ${mapsQuery ? `<a class="btn-secondary small" href="${gmapsLink(mapsQuery)}" target="_blank" rel="noopener" title="Obrir a Google Maps">📍</a>` : ''}
            <a class="btn-secondary small" href="${googleCalLink(ev)}" target="_blank" rel="noopener">+ Cal</a>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('') || emptyState('Res per fer seguiment encara: afegeix dies, vols o allotjaments amb dates.');
  $('#content').innerHTML = `

    ${dayGroups}`;
}

// ════════════════════════════════════════════════════
//  ATTACHMENTS: FILE INPUT
// ════════════════════════════════════════════════════
let fileInputEl;
function ensureFileInput() {
  if (fileInputEl) return fileInputEl;
  fileInputEl = document.createElement('input');
  fileInputEl.type = 'file';
  fileInputEl.accept = 'application/pdf';
  fileInputEl.style.display = 'none';
  document.body.appendChild(fileInputEl);
  fileInputEl.addEventListener('change', async () => {
    const file = fileInputEl.files[0];
    if (!file || !state.pendingAttach) return;
    const { arr, idx } = state.pendingAttach;
    const trip = getCurrentTrip();
    const item = getNestedArray(trip, arr)[idx];
    try {
      // Llegeix tot el contingut ara mateix (força que fitxers de núvol com
      // OneDrive/Drive es baixin del tot abans de desar-los, en comptes de
      // guardar una referència que podria quedar buida més endavant).
      const buf = await file.arrayBuffer();
      if (!buf || buf.byteLength === 0) throw new Error('El fitxer sembla buit. Si ve d’OneDrive/Drive, prova de desar-lo primer a "Fitxers" del mòbil i adjunta’l des d’allà.');
      const blob = new Blob([buf], { type: file.type || 'application/pdf' });
      // Adjunt local: es guarda només en aquest dispositiu (IndexedDB), no es puja
      // ni es comparteix enlloc. No cal token ni contrasenya de xifrat per això.
      const blobId = await idbAdd('attachments', { filename: file.name, mimeType: blob.type, blob });
      item.attachments = item.attachments || [];
      item.attachments.push({ filename: file.name, blobId });
      await saveTrip(trip);
    } catch (e) {
      alert('No s’ha pogut adjuntar el fitxer: ' + e.message);
    }
    fileInputEl.value = '';
    state.pendingAttach = null;
    renderAll();
  });
  return fileInputEl;
}
async function openAttachmentByRef(arrName, idx, ai) {
  const trip = getCurrentTrip();
  const item = getNestedArray(trip, arrName)[idx];
  const a = item.attachments[ai];
  if (a.path) { window.open(a.path, '_blank'); return; }
  if (a.blobId != null) {
    // Obre la pestanya ABANS de l'await: alguns navegadors mòbils (Safari
    // sobretot) bloquegen window.open() si passa massa temps després del
    // clic de l'usuari (per això es quedava "només com a opció").
    const newTab = window.open('', '_blank');
    const rec = await idbGet('attachments', a.blobId);
    if (!rec || !rec.blob || rec.blob.size === 0) {
      if (newTab) newTab.close();
      alert('Aquest adjunt no s’ha pogut carregar. Torna\'l a adjuntar amb "+ Adjuntar PDF".');
      return;
    }
    const url = URL.createObjectURL(rec.blob);
    if (newTab) newTab.location.href = url;
    else window.open(url, '_blank');
  }
}
async function deleteAttachmentByRef(arrName, idx, ai) {
  const trip = getCurrentTrip();
  const item = getNestedArray(trip, arrName)[idx];
  const a = item.attachments[ai];
  if (a.blobId != null) {
    await idbDelete('attachments', a.blobId);
  }
  item.attachments.splice(ai, 1);
  await saveTrip(trip);
  renderAll();
}

// ════════════════════════════════════════════════════
//  ADJUNTS DEL VIATGER (passaport) — mateix patró que els de tram/allotjament
//  però penjats del registre de viatgers, no d'un viatge concret.
// ════════════════════════════════════════════════════
let travelerFileInputEl;
function ensureTravelerFileInput() {
  if (travelerFileInputEl) return travelerFileInputEl;
  travelerFileInputEl = document.createElement('input');
  travelerFileInputEl.type = 'file';
  travelerFileInputEl.accept = 'application/pdf,image/*';
  travelerFileInputEl.style.display = 'none';
  document.body.appendChild(travelerFileInputEl);
  travelerFileInputEl.addEventListener('change', async () => {
    const file = travelerFileInputEl.files[0];
    travelerFileInputEl.value = '';
    const travelerId = state.pendingTravelerAttach;
    state.pendingTravelerAttach = null;
    if (!file || !travelerId) return;
    const tr = state.travelers.find((t) => t.id === travelerId);
    if (!tr) return;
    try {
      const buf = await file.arrayBuffer();
      if (!buf || buf.byteLength === 0) throw new Error('El fitxer sembla buit. Si ve d’OneDrive/Drive, prova de desar-lo primer a "Fitxers" del mòbil i adjunta’l des d’allà.');
      const blob = new Blob([buf], { type: file.type || 'application/octet-stream' });
      const blobId = await idbAdd('attachments', { filename: file.name, mimeType: blob.type, blob });
      tr.attachments = tr.attachments || [];
      tr.attachments.push({ filename: file.name, blobId });
      await idbPut('travelers', tr);
    } catch (e) {
      alert('No s’ha pogut adjuntar el fitxer: ' + e.message);
    }
    renderAll();
  });
  return travelerFileInputEl;
}
async function openTravelerAttachment(travelerId, ai) {
  const tr = state.travelers.find((t) => t.id === travelerId);
  const a = tr && tr.attachments && tr.attachments[ai];
  if (!a) return;
  const newTab = window.open('', '_blank');
  const rec = await idbGet('attachments', a.blobId);
  if (!rec || !rec.blob || rec.blob.size === 0) {
    if (newTab) newTab.close();
    alert('Aquest adjunt no s’ha pogut carregar. Torna\'l a adjuntar.');
    return;
  }
  const url = URL.createObjectURL(rec.blob);
  if (newTab) newTab.location.href = url;
  else window.open(url, '_blank');
}
async function deleteTravelerAttachment(travelerId, ai) {
  const tr = state.travelers.find((t) => t.id === travelerId);
  if (!tr || !tr.attachments) return;
  const a = tr.attachments[ai];
  if (a && a.blobId != null) await idbDelete('attachments', a.blobId);
  tr.attachments.splice(ai, 1);
  await idbPut('travelers', tr);
  renderAll();
}
function renderTravelerAttachments(tr) {
  const items = (tr.attachments || []).map((a, ai) => `
    <span class="chip">
      <button data-action="open-traveler-attachment" data-traveler-id="${tr.id}" data-ai="${ai}">📎 ${escapeHtml(a.filename)}</button>
      <button class="chip-x" data-action="delete-traveler-attachment" data-traveler-id="${tr.id}" data-ai="${ai}">✕</button>
    </span>`).join('');
  return `<div class="attachments">
    <div class="attachments-list">${items}</div>
    <button class="btn-secondary small" data-action="attach-traveler-file" data-traveler-id="${tr.id}">+ Adjuntar passaport (foto/PDF)</button>
  </div>`;
}

// ════════════════════════════════════════════════════
//  ESCÀNER DE PASSAPORT (MRZ) — 100% al navegador amb Tesseract.js (OCR),
//  cap dada ni foto surt del dispositiu. Precisió variable segons la
//  qualitat de la foto: sempre revisa els camps abans de continuar.
// ════════════════════════════════════════════════════
let tesseractLoadPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve();
  if (tesseractLoadPromise) return tesseractLoadPromise;
  tesseractLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    script.onload = () => resolve();
    script.onerror = () => { tesseractLoadPromise = null; reject(new Error('No s’ha pogut carregar la llibreria OCR (revisa la connexió a internet; només cal la primera vegada).')); };
    document.head.appendChild(script);
  });
  return tesseractLoadPromise;
}
const MRZ_CHAR_VALUES = (() => {
  const map = {};
  for (let i = 0; i <= 9; i++) map[String(i)] = i;
  for (let i = 0; i < 26; i++) map[String.fromCharCode(65 + i)] = 10 + i;
  map['<'] = 0;
  return map;
})();
function mrzDateToISO(yymmdd) {
  if (!/^\d{6}$/.test(yymmdd || '')) return null;
  const yy = +yymmdd.slice(0, 2), mm = yymmdd.slice(2, 4), dd = yymmdd.slice(4, 6);
  const nowYY = new Date().getFullYear() % 100;
  const century = (yy > nowYY + 20) ? 1900 : 2000;
  return `${century + yy}-${mm}-${dd}`;
}
function padOrTrim(s, len) { return ((s || '') + '<'.repeat(len)).slice(0, len); }
function findMrzLines(text) {
  const lines = text.split('\n').map((l) => l.trim().toUpperCase().replace(/\s+/g, '').replace(/O/g, '0').replace(/[^A-Z0-9<]/g, '')).filter(Boolean);
  // Les línies MRZ tenen ~44 caràcters (A-Z0-9<); l'OCR sovint perd algun caràcter.
  const candidates = lines.filter((l) => l.length >= 30 && l.length <= 44 && /^[A-Z0-9<]+$/.test(l));
  for (let i = 0; i < candidates.length - 1; i++) {
    if (candidates[i].startsWith('P<') || candidates[i].startsWith('P4')) return [candidates[i], candidates[i + 1]];
  }
  if (candidates.length >= 2) return candidates.slice(-2);
  return null;
}
function titleCaseName(s) { return (s || '').toLowerCase().replace(/\b\p{L}/gu, (c) => c.toUpperCase()); }
const COUNTRY_CODE_NAMES = { ESP: 'Espanyola', FRA: 'Francesa', PRT: 'Portuguesa', ITA: 'Italiana', GBR: 'Britànica', USA: 'Nord-americana', DEU: 'Alemanya', AND: 'Andorrana', MAR: 'Marroquina', PHL: 'Filipina', ARG: 'Argentina', MEX: 'Mexicana', BRA: 'Brasilera' };
function nationalityLabel(code) { return COUNTRY_CODE_NAMES[code] || code; }
function parseMRZ(line1, line2) {
  line1 = padOrTrim(line1, 44);
  line2 = padOrTrim(line2, 44);
  const namesRaw = line1.slice(5).replace(/<+$/, '');
  const [surnameRaw, givenRaw] = namesRaw.split('<<');
  const surname = (surnameRaw || '').split('<').filter(Boolean).join(' ');
  const givenNames = (givenRaw || '').split('<').filter(Boolean).join(' ');
  const passportNumber = line2.slice(0, 9).replace(/</g, '');
  const nationality = line2.slice(10, 13).replace(/</g, '');
  const sexChar = line2[20];
  return {
    surname: titleCaseName(surname),
    givenNames: titleCaseName(givenNames),
    passportNumber,
    nationality: nationalityLabel(nationality),
    birthDate: mrzDateToISO(line2.slice(13, 19)),
    sex: sexChar === 'M' ? 'M' : (sexChar === 'F' ? 'F' : ''),
    expiryDate: mrzDateToISO(line2.slice(21, 27)),
  };
}
let passportScanInputEl;
function ensurePassportScanInput() {
  if (passportScanInputEl) return passportScanInputEl;
  passportScanInputEl = document.createElement('input');
  passportScanInputEl.type = 'file';
  passportScanInputEl.accept = 'image/*';
  passportScanInputEl.setAttribute('capture', 'environment');
  passportScanInputEl.style.display = 'none';
  document.body.appendChild(passportScanInputEl);
  passportScanInputEl.addEventListener('change', async () => {
    const file = passportScanInputEl.files[0];
    passportScanInputEl.value = '';
    const travelerId = state.pendingPassportScan;
    state.pendingPassportScan = null;
    if (!file || !travelerId) return;
    await runPassportScan(travelerId, file);
  });
  return passportScanInputEl;
}
async function runPassportScan(travelerId, file) {
  const tr = state.travelers.find((t) => t.id === travelerId);
  if (!tr) return;
  const statusEl = document.getElementById('passportScanStatus-' + travelerId);
  if (statusEl) statusEl.textContent = '⏳ Carregant OCR…';
  try {
    await loadTesseract();
    if (statusEl) statusEl.textContent = '⏳ Llegint el passaport…';
    const { data } = await Tesseract.recognize(file, 'eng');
    const mrzLines = findMrzLines(data.text);
    if (!mrzLines) throw new Error('No s’ha trobat la zona de lectura (MRZ, les dues línies de codi de sota). Prova amb una foto més ben enquadrada i enfocada de la pàgina de dades.');
    const parsed = parseMRZ(mrzLines[0], mrzLines[1]);
    if (parsed.passportNumber) tr.passportNumber = parsed.passportNumber;
    if (parsed.birthDate) tr.birthDate = parsed.birthDate;
    if (parsed.expiryDate) tr.passportExpiryDate = parsed.expiryDate;
    if (parsed.nationality) tr.nationality = parsed.nationality;
    if (parsed.sex) tr.sex = parsed.sex;
    if (!tr.firstName && parsed.givenNames) tr.firstName = parsed.givenNames;
    if (!tr.lastName && parsed.surname) tr.lastName = parsed.surname;
    await idbPut('travelers', tr);
    if (statusEl) statusEl.textContent = '';
    renderAll();
    alert('S’han omplert els camps a partir de l’escaneig. Revisa’ls (sobretot el número de passaport i les dates) — l’OCR no sempre encerta el 100%.');
  } catch (e) {
    if (statusEl) statusEl.textContent = '';
    alert('No s’ha pogut llegir el passaport: ' + e.message);
  }
}

// ════════════════════════════════════════════════════
//  EVENT DELEGATION
// ════════════════════════════════════════════════════
document.addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const trip = getCurrentTrip();

  switch (action) {
    case 'switch-tab':
      state.tab = btn.dataset.tab;
      renderAll();
      break;
    case 'switch-variant':
      state.currentVariantId = btn.dataset.variant;
      renderAll();
      break;
    case 'switch-scenario':
      state.budgetScenario = btn.dataset.scenario;
      renderAll();
      break;
    case 'create-trip': {
      const t = newBlankTrip();
      await saveTrip(t);
      state.currentTripId = t.id;
      state.currentVariantId = defaultVariantFor(t);
      state.tab = 'itinerari';
      renderAll();
      break;
    }
    case 'delete-trip': {
      if (state.trips.length <= 1) break;
      if (!confirm('Eliminar aquest viatge? Aquesta acció no es pot desfer.')) break;
      const id = btn.dataset.id;
      await idbDelete('trips', id);
      state.trips = state.trips.filter((t) => t.id !== id);
      const next = state.trips.find((t) => t.isDefault) || state.trips[0];
      state.currentTripId = next.id;
      state.currentVariantId = defaultVariantFor(next);
      renderAll();
      break;
    }
    case 'add-row': {
      const arrName = btn.dataset.arr;
      getNestedArray(trip, arrName).push(newRowFor(arrName, trip));
      await saveTrip(trip);
      renderAll();
      break;
    }
    case 'remove-row': {
      const arrName = btn.dataset.arr;
      const idx = +btn.dataset.idx;
      if (arrName === 'variants') {
        const removed = trip.variants[idx];
        trip.variants.splice(idx, 1);
        if (removed && removed.recommended && trip.variants.length) trip.variants[0].recommended = true;
        if (removed && state.currentVariantId === removed.id) state.currentVariantId = defaultVariantFor(trip);
      } else {
        getNestedArray(trip, arrName).splice(idx, 1);
      }
      await saveTrip(trip);
      renderAll();
      break;
    }
    case 'add-traveler': {
      const tr = { id: 't-' + uid(), firstName: '', lastName: '', birthDate: null, sex: '', nationality: '', placeOfBirth: null, passportNumber: null, passportIssueDate: null, passportExpiryDate: null, isCoreFamily: false, attachments: [] };
      await idbPut('travelers', tr);
      state.travelers.push(tr);
      if (trip) { trip.travelerIds = [...(trip.travelerIds || []), tr.id]; await saveTrip(trip); }
      renderAll();
      break;
    }
    case 'delete-traveler': {
      if (!confirm('Eliminar aquest viatger del registre? Es traurà de tots els viatges.')) break;
      const id = btn.dataset.id;
      await idbDelete('travelers', id);
      state.travelers = state.travelers.filter((t) => t.id !== id);
      for (const tp of state.trips) {
        let changed = false;
        if ((tp.travelerIds || []).includes(id)) { tp.travelerIds = tp.travelerIds.filter((x) => x !== id); changed = true; }
        (tp.familyGroups || []).forEach((g) => { if ((g.travelerIds || []).includes(id)) { g.travelerIds = g.travelerIds.filter((x) => x !== id); changed = true; } });
        if (changed) await saveTrip(tp);
      }
      renderAll();
      break;
    }
    case 'attach-file':
      state.pendingAttach = { arr: btn.dataset.arr, idx: +btn.dataset.idx };
      ensureFileInput().click();
      break;
    case 'open-attachment':
      await openAttachmentByRef(btn.dataset.arr, +btn.dataset.idx, +btn.dataset.ai);
      break;
    case 'delete-attachment':
      await deleteAttachmentByRef(btn.dataset.arr, +btn.dataset.idx, +btn.dataset.ai);
      break;
    case 'attach-traveler-file':
      state.pendingTravelerAttach = btn.dataset.travelerId;
      ensureTravelerFileInput().click();
      break;
    case 'open-traveler-attachment':
      await openTravelerAttachment(btn.dataset.travelerId, +btn.dataset.ai);
      break;
    case 'delete-traveler-attachment':
      await deleteTravelerAttachment(btn.dataset.travelerId, +btn.dataset.ai);
      break;
    case 'scan-passport':
      state.pendingPassportScan = btn.dataset.travelerId;
      ensurePassportScanInput().click();
      break;
    case 'export-mymaps-csv':
      exportMyMapsCSV(trip);
      break;
    case 'export-ics':
      exportICS(trip);
      break;
    case 'expense-split-family': {
      const idx = +btn.dataset.idx;
      const g = (trip.familyGroups || []).find((x) => x.id === btn.dataset.family);
      if (!g) break;
      const exp = trip.expenses[idx];
      const set = new Set(exp.splitAmong || []);
      (g.travelerIds || []).forEach((id) => set.add(id));
      exp.splitAmong = Array.from(set);
      await saveTrip(trip);
      renderAll();
      break;
    }
    case 'expense-split-all': {
      const idx = +btn.dataset.idx;
      trip.expenses[idx].splitAmong = [...(trip.travelerIds || [])];
      await saveTrip(trip);
      renderAll();
      break;
    }
  }
});

document.addEventListener('change', async (e) => {
  const t = e.target;
  const trip = getCurrentTrip();
  if (!trip) return;

  if (t.matches('[data-action="mark-recommended"]')) {
    const v = t.dataset.variant;
    trip.variants.forEach((x) => { x.recommended = (x.id === v); });
    await saveTrip(trip);
    renderAll();
    return;
  }
  if (t.matches('[data-action="toggle-trip-traveler"]')) {
    const id = t.dataset.id;
    const set = new Set(trip.travelerIds || []);
    if (t.checked) set.add(id); else set.delete(id);
    trip.travelerIds = Array.from(set);
    await saveTrip(trip);
    renderTopbar();
    return;
  }
  if (t.matches('[data-action="toggle-expense-split"]')) {
    const idx = +t.dataset.idx;
    const travelerId = t.dataset.traveler;
    const exp = trip.expenses[idx];
    const set = new Set(exp.splitAmong || []);
    if (t.checked) set.add(travelerId); else set.delete(travelerId);
    exp.splitAmong = Array.from(set);
    await saveTrip(trip);
    if (state.tab === 'despeses') renderDespesesTab(trip);
    return;
  }
  if (t.matches('[data-trip-field]')) {
    setNested(trip, t.dataset.tripField, t.value);
    await saveTrip(trip);
    return;
  }
  if (t.matches('[data-entity="traveler"][data-field]')) {
    const tr = state.travelers.find((x) => x.id === t.dataset.id);
    if (tr) { setNested(tr, t.dataset.field, t.value); await idbPut('travelers', tr); }
    return;
  }
  if (t.matches('[data-arr][data-field]')) {
    updateField(t.dataset.arr, +t.dataset.idx, t.dataset.field, t.value);
    if (t.dataset.arr === 'budget.categories' && state.tab === 'pressupost') { renderPressupostTab(getCurrentTrip()); }
    if (t.dataset.arr === 'expenses' && state.tab === 'despeses' && (t.dataset.field === 'amount' || t.dataset.field === 'paidBy')) { renderDespesesTab(getCurrentTrip()); }
    return;
  }
});

// ════════════════════════════════════════════════════
//  START
// ════════════════════════════════════════════════════
boot().catch((err) => {
  console.error(err);
  document.getElementById('content').innerHTML = `<div class="empty-state">Error carregant l'app: ${escapeHtml(err.message || err)}</div>`;
});
</script>
